<div #pageHomeComponent class="bg-main-bg dark:bg-dark-bg text-main-secondary-darker dark:text-main-bg">
    <app-header class="bg-inherit"></app-header>
    <div class="relative flex flex-col bg-inherit h-auto">
        <div class="relative flex flex-col min-h-screen">
            <!-- Section Title occupying most of the screen -->
            <app-section-title [sectionTitleOptions]="{
                    title: 'Hello!\nI am Tiago Barracha,\nFullstack Developer',
                    subTitle: 'I create web and mobile apps, video games & all things IOT'
                }" class=" px-[10%]">
            </app-section-title>

            <!-- Project Type Selector fixed at the bottom of the screen -->
            <app-project-type-selector #stickyProjectTypeSelector [ngClass]="{
                    'shadow-lg h-10': isSticky
                }" class="bg-inherit z-30 top-12 sticky px-[10%]">
            </app-project-type-selector>
        </div>

        @if (isSticky) {
            <!-- Project Type Selector fixed at the bottom of the screen -->
            <app-project-type-selector #mainStickyProjectTypeSelector [ngClass]="{
                'shadow-lg h-10': isSticky
            }" class="bg-inherit z-30 top-12 sticky px-[10%]">
            </app-project-type-selector>
        }

        <!-- Project List, appears below project type selector -->
        <app-project-list class="mt-16 px-[10%] min-h-screen"></app-project-list>
    </div>
</div>

<app-project-modal [componentToPad]="pageHomeComponent"></app-project-modal>
