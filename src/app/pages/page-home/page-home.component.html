<div #pageHomeComponent class="bg-main-bg dark:bg-dark-bg text-main-secondary-darker dark:text-main-bg">
    <!-- [ngStyle]="{'opacity': headerOpacity}" -->
    <app-header #header
    class="sticky bg-inherit shadow-lg transition-all duration-300 z-30"
    [ngClass]="{
        'top-0' : isTitleVisible,
        '-top-16': !isTitleVisible
    }">
    </app-header>
    <!-- <app-header #header class="bg-inherit {{ headerOpacityClass }}"></app-header> -->
    <div class="relative flex flex-col bg-inherit h-auto">
        <!-- Section Title occupying most of the screen -->
        <app-section-title #sectionTitle [sectionTitleOptions]="{
            title: 'Hello!\nI am Tiago Barracha,\nFullstack Developer',
            subTitle: 'I create web and mobile apps, video games & all things IOT'
        }" class=" px-[10%]">
        </app-section-title>

        <!-- Project Type Selector fixed at the bottom of the screen -->
        <app-project-type-selector #innerStickyProjectTypeSelector
            class="bg-inherit h-12 flex items-center z-40 top-0 sticky px-[10%] transition-all duration-300"
            [ngClass]="{
                'shadow-lg text-center': !isTitleVisible
            }">
        </app-project-type-selector>


        <!-- Project List, appears below project type selector -->
        <app-project-list class="px-[10%] min-h-screen transition-all duration-300"
        [ngClass]="{
            'pt-16': !isTitleVisible
        }"></app-project-list>
    </div>
</div>

<app-project-modal [componentToPad]="pageHomeComponent"></app-project-modal>
<app-mobile-menu></app-mobile-menu>
