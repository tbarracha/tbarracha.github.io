<div class="bg-inherit h-8 w-full flex items-center space-x-2">
    @for(type of projectTypes; track type) {
        <button class="w-16 text-left
        {{ projectService.selectedProjectType === type ? 'font-bold text-main-hl-primary' : ' hover:font-semibold' }} "
        (click)="selectProjectType(type)">
            {{ type }}
        </button>
    }
</div>
